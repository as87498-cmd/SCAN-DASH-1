        body {

            background-attachment: fixed;

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;

            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .input-box::placeholder { color: #ddd; }

        .btn {

            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);

            box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 15px 25px rgba(58, 123, 213, 0.4); }

        .hidden { display: none; }

        .arrow {

            width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent;
            border-top: 40px solid #ff0000; z-index: 100;
        }
