<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAN-DASH | SHIVAY & BHANU</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050a18; color: #ffffff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .card { width: 95%; max-width: 400px; background: #101a32; border: 3px solid #00d2ff; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 0 25px rgba(0, 210, 255, 0.4); }
        h2 { color: #00d2ff; margin-bottom: 15px; text-transform: uppercase; font-size: 1.2rem; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #050a18; border: 2px solid #1e293b; color: #00d2ff; border-radius: 10px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(90deg, #00d2ff, #3a7bd5); color: #000; font-weight: bold; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; }
        .img-container { width: 100%; height: 200px; background: #050a18; border-radius: 10px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-container img { width: 100%; height: auto; }
        
        /* Game Area */
        #gameArea { width: 100%; height: 200px; background: #050a18; border: 2px solid #333; position: relative; overflow: hidden; display: none; margin-bottom: 10px; border-radius: 10px; }
        #mario { width: 30px; height: 30px; background: #ff0055; position: absolute; bottom: 0; left: 50px; border-radius: 5px; box-shadow: 0 0 10px #ff0055; }
        #obstacle { width: 20px; height: 40px; background: #00fbff; position: absolute; bottom: 0; right: -20px; box-shadow: 0 0 10px #00fbff; }
        #score { position: absolute; top: 10px; right: 10px; color: #fff; font-weight: bold; }
        .jump { animation: jump 0.5s linear; }
        @keyframes jump { 0% { bottom: 0; } 30% { bottom: 80px; } 70% { bottom: 80px; } 100% { bottom: 0; } }
    </style>
</head>
<body>

    <div class="card">
        <div id="step1">
            <h2>User Login</h2>
            <input type="text" id="uname" placeholder="Full Name">
            <input type="number" id="umob" placeholder="Mobile Number">
            <button class="btn" onclick="goToStep2()">Login</button>
        </div>

        <div id="step2" style="display: none;">
            <h2>Shivay Finance</h2>
            <div class="img-container">
                <img src="poster.png" onerror="this.src='https://via.placeholder.com/300x200?text=Shivay+Finance+Loans'">
            </div>
            <p style="font-size: 0.8rem; margin-bottom: 10px;">Obstacle se bacho aur Reward jito!</p>
            <button class="btn" onclick="startDashGame()">Start Game</button>
        </div>

        <div id="step3" style="display: none;">
            <h2>Jump to Win!</h2>
            <div id="gameArea" onclick="jump()">
                <div id="score">Score: 0</div>
                <div id="mario"></div>
                <div id="obstacle"></div>
            </div>
            <p style="font-size: 0.7rem; color: #aaa;">Screen par Tap karein Jump karne ke liye</p>
        </div>

        <div id="step4" style="display: none;">
            <h2 style="color: #00ff00;">CONGRATS!</h2>
            <div id="prize" style="background: #ffcc00; color: #000; padding: 15px; font-size: 24px; font-weight: bold; border-radius: 10px; margin-bottom: 15px;"></div>
            <div class="img-container">
                <img src="banner.png" onerror="this.src='https://via.placeholder.com/300x200?text=Bhanu+Auto+Service'">
            </div>
            <p style="color: #00d2ff; font-weight: bold;">Bhanu Auto Service, Ratlam</p>
            <button class="btn" style="margin-top:10px;" onclick="location.reload()">Play Again</button>
        </div>
    </div>

<script>
    let score = 0;
    let gameRunning = false;
    const mario = document.getElementById("mario");
    const obstacle = document.getElementById("obstacle");
    const scoreDisplay = document.getElementById("score");

    function goToStep2() {
        if(document.getElementById('uname').value === "" || document.getElementById('umob').value === "") {
            alert("Details bhariye bhai!"); return;
        }
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }

    function startDashGame() {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'block';
        document.getElementById('gameArea').style.display = 'block';
        gameRunning = true;
        runGame();
    }

    function jump() {
        if(mario.classList != "jump") {
            mario.classList.add("jump");
            setTimeout(() => { mario.classList.remove("jump"); }, 500);
        }
    }

    function runGame() {
        let obstaclePos = 400;
        let interval = setInterval(() => {
            if(!gameRunning) { clearInterval(interval); return; }

            obstaclePos -= 5;
            if(obstaclePos < -20) {
                obstaclePos = 400;
                score++;
                scoreDisplay.innerText = "Score: " + score;
            }
            obstacle.style.right = (400 - obstaclePos) + "px";

            // Collision Detection
            let marioBottom = parseInt(window.getComputedStyle(mario).getPropertyValue("bottom"));
            let obstacleLeft = parseInt(window.getComputedStyle(obstacle).getPropertyValue("left"));

            if(obstacleLeft < 80 && obstacleLeft > 50 && marioBottom <= 40) {
                gameRunning = false;
                showPrize();
            }
        }, 20);
    }

    function showPrize() {
        const rewards = ["COLDRINK", "5% OFF", "10% OFF", "FREE WASH", "20% OFF", "ICECREAM"];
        // Score ke hisab se reward
        let win = rewards[score % rewards.length];
        if(score > 10) win = "30% SUPER OFF";

        document.getElementById('step3').style.display = 'none';
        document.getElementById('step4').style.display = 'block';
        document.getElementById('prize').innerText = win;
    }
</script>
</body>
</html>
