<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhanu Auto & Shivay Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #050a18; /* Deep Dark Blue (Avengers Theme) */
            background-image: radial-gradient(circle at 50% 50%, #102a43 0%, #050a18 100%);
            font-family: 'Roboto', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            width: 90%;
            max-width: 400px;
            background: #10213e; /* Solid dark background */
            border: 3px solid #00d2ff;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 20px #00d2ff;
        }

        h2 { font-family: 'Orbitron', sans-serif; color: #00d2ff; margin-bottom: 20px; text-transform: uppercase; }

        /* Input Fields */
        .input-field {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 2px solid #1d3557;
            background: #050a18;
            color: #00d2ff;
            font-size: 16px;
            outline: none;
        }
        .input-field:focus { border-color: #00d2ff; }

        .btn {
            background: linear-gradient(90deg, #ff0055, #ffcc00);
            color: #000;
            padding: 15px;
            width: 100%;
            border: none;
            border-radius: 10px;
            font-weight: 900;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.4);
        }

        .hidden { display: none; }

        /* Poster Image Style */
        .poster {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 2px solid #fff;
        }

        /* Spin Wheel Section */
        .wheel-area {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }
        
        /* The Red Arrow */
        .arrow-top {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff0000; /* Red Arrow */
            z-index: 10;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 0 15px #00d2ff;
        }

        #result-text { font-size: 20px; color: #ffcc00; margin-top: 10px; font-weight: bold; }
    </style>
</head>

        <div id="step-login">
            <h2>User Login</h2>
            <input type="text" id="uname" class="input-field" placeholder="Aapka Naam">
            <input type="number" id="umob" class="input-field" placeholder="Mobile Number">
            <button class="btn" onclick="goNext('step-poster')">Open Rewards</button>
        </div>

        <div id="step-poster" class="hidden">
            <h2>Shivay Finance</h2>
            <img src="poster.png" class="poster" onerror="this.src='https://via.placeholder.com/300x500?text=Poster+Missing'">
            <button class="btn" onclick="goNext('step-spin')">Click to Spin</button>
        </div>
