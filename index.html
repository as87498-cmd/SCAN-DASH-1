<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanDash | Integrated Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .hidden { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        body { background: #0f172a; font-family: 'Outfit', sans-serif; color: white; }
        .spin-anim { transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
    </style>
</head>
<body>

    <div id="customerPage" class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-blue-500 italic">SCANDASH</h1>
            <p class="text-gray-400 mt-2">Welcome to <span class="text-white font-bold" id="currentShop">Egg Planet</span></p>
        </div>

        <div class="relative w-80 h-80 flex items-center justify-center">
            <div id="wheel" class="spin-anim w-full h-full rounded-full border-8 border-white/10 shadow-[0_0_50px_rgba(59,130,246,0.3)] bg-slate-800 flex items-center justify-center">
                <div class="absolute w-1 h-full bg-white/20"></div>
                <div class="absolute w-full h-1 bg-white/20"></div>
                <span class="text-xs font-bold text-gray-500 uppercase">Spin to Win</span>
            </div>
            <div class="absolute -top-4 text-3xl text-yellow-400">▼</div>
        </div>

        <button onclick="playGame()" id="spinBtn" class="mt-12 bg-blue-600 px-12 py-4 rounded-2xl font-black text-xl shadow-xl shadow-blue-600/30">SPIN & WIN</button>
        
        <button onclick="goToAuth()" class="mt-20 text-gray-500 text-sm border-b border-gray-700">Go to Admin/Merchant Login</button>
    </div>

    <div id="authSection" class="hidden min-h-screen flex items-center justify-center p-6 bg-slate-900">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md text-center">
            <h2 class="text-3xl font-black mb-8">Portal Login</h2>
            <input type="text" id="u" placeholder="ID" class="w-full bg-white/5 p-4 rounded-xl mb-4 border border-white/10">
            <input type="password" id="p" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl mb-6 border border-white/10">
            <button onclick="login()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">ENTER DASHBOARD</button>
        </div>
    </div>

    <div id="merchantDash" class="hidden min-h-screen p-6 bg-slate-50 text-slate-900">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black">Shop Dashboard</h2>
                <button onclick="location.reload()" class="text-red-500 font-bold">Logout</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="bg-white p-8 rounded-3xl shadow-sm border-b-8 border-blue-600 text-center">
                    <p class="text-gray-400 font-bold uppercase text-xs">Total Scans Today</p>
                    <h3 class="text-6xl font-black mt-2 text-blue-600" id="scanCount">0</h3>
                </div>
                <div class="bg-slate-900 p-8 rounded-3xl shadow-xl text-white">
                    <h3 class="text-yellow-400 font-bold mb-4 uppercase">Waiver Status</h3>
                    <div class="w-full bg-slate-700 h-4 rounded-full mb-2">
                        <div class="bg-yellow-500 h-4 rounded-full" id="progressBar" style="width: 0%"></div>
                    </div>
                    <p class="text-sm">Target: ₹10,000 | <span id="progressText">0% Complete</span></p>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-3xl shadow-sm">
                <h4 class="font-bold mb-4">Last Customer Rewards</h4>
                <div id="rewardList" class="space-y-3">
                    <p class="text-gray-400 italic">Waiting for scans...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global State (In real app, this is in a Database)
        let totalScans = 0;
        let shopName = "Egg Planet";

        // Customer Logic
        function playGame() {
            const wheel = document.getElementById('wheel');
            const btn = document.getElementById('spinBtn');
            const deg = Math.floor(2000 + Math.random() * 2000);
            
            wheel.style.transform = `rotate(${deg}deg)`;
            btn.disabled = true;
            btn.innerHTML = "Spinning...";

            setTimeout(() => {
                totalScans++; // Increment scan count
                alert("CONGRATS! You won a FREE DASH COLA at " + shopName);
                btn.innerHTML = "Check Reward at Counter";
                btn.classList.replace('bg-blue-600', 'bg-green-600');
            }, 4000);
        }

        // Navigation & Auth
        function goToAuth() {
            document.getElementById('customerPage').classList.add('hidden');
            document.getElementById('authSection').classList.remove('hidden');
        }

        function login() {
            const user = document.getElementById('u').value;
            if(user === 'merchant' || user === 'admin') {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('merchantDash').classList.remove('hidden');
                updateMerchantDash();
            } else {
                alert("Please use 'merchant' as ID");
            }
        }

        // Update Merchant Dash with Customer Data
        function updateMerchantDash() {
            document.getElementById('scanCount').innerText = totalScans;
            const progress = (totalScans * 5) % 100; // Fake progress for demo
            document.getElementById('progressBar').style.width = progress + "%";
            document.getElementById('progressText').innerText = progress + "% Complete";
            
            if(totalScans > 0) {
                const list = document.getElementById('rewardList');
                list.innerHTML = `<div class="flex justify-between p-3 bg-blue-50 rounded-xl font-bold"><span>Customer #${totalScans}</span><span class="text-green-600">Free Dash Cola</span></div>` + list.innerHTML;
            }
        }
    </script>
</body>
</html>
