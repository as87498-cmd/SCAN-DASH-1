<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAN-DASH | Shivay & Bhanu</title>
    <style>
        /* FULL ROBUST DESIGN - NO TRANSPARENCY ISSUES */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #05070a; /* Ultra Dark Blue */
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .main-card {
            width: 90%;
            max-width: 400px;
            background-color: #0f172a; /* Solid Deep Blue */
            border: 3px solid #38bdf8; /* Cyan Border */
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
        }

        .hidden { display: none; }

        h2 { color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #1e293b;
            border: 2px solid #334155;
            color: #fff;
            border-radius: 10px;
            font-size: 16px;
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            color: #000;
            font-weight: bold;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* IMAGE HANDLING */
        .img-container {
            width: 100%;
            min-height: 250px;
            background: #1e293b;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #38bdf8;
            overflow: hidden;
        }

        .img-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* SPIN WHEEL */
        .wheel-box {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 20px auto;
        }

        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ef4444; /* Red Pointer */
            z-index: 50;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #fff;
        }
