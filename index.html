<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAN-DASH | SHIVAY & BHANU</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050a18; color: #ffffff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card { width: 90%; max-width: 400px; background: #101a32; border: 3px solid #00d2ff; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 0 25px rgba(0, 210, 255, 0.4); }
        .hidden { display: none !important; }
        h2 { color: #00d2ff; margin-bottom: 20px; text-transform: uppercase; }

        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #050a18; border: 2px solid #1e293b; color: #00d2ff; border-radius: 10px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(90deg, #00d2ff, #3a7bd5); color: #000; font-weight: bold; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; }

        .img-container { width: 100%; min-height: 250px; background: #050a18; border: 1px dashed #00d2ff; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-container img { width: 100%; height: auto; display: block; }

        .wheel-box { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        .arrow { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ff0000; z-index: 99; }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #fff; background: #fff; }
        #win-msg { font-size: 22px; color: #ffcc00; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <div id="step1">
            <h2>User Login</h2>
            <input type="text" id="uname" placeholder="Full Name">
            <input type="number" id="umob" placeholder="Mobile Number">
            <button class="btn" onclick="goToStep2()">Login</button>
        </div>

        <div id="step2" class="hidden">
            <h2>Shivay Finance</h2>
            <div class="img-container">
                <img src="poster.png" onerror="this.src='https://via.placeholder.com/300x500?text=Shivay+Poster'">
            </div>
            <button class="btn" onclick="goToStep3()">Try Your Luck</button>
        </div>

        <div id="step3" class="hidden">
            <h2>Spin to Win</h2>
            <div class="wheel-box">
                <div class="arrow"></div>
                <canvas id="c" width="300" height="300"></canvas>
            </div>
            <button id="sBtn" class="btn" onclick="spinNow()">SPIN NOW</button>
            <div id="win-msg"></div>
        </div>

        <div id="step4" class="hidden">
            <h2 style="color: #00ff00;">CONGRATS!</h2>
            <div id="prize" style="background: #ffcc00; color: #000; padding: 15px; font-size: 26px; font-weight: bold; border-radius: 10px; margin-bottom: 20px;"></div>
            <div class="img-container">
                <img src="banner.png" onerror="this.src='https://via.placeholder.com/300x500?text=Bhanu+Auto'">
            </div>
            <p>Bhanu Auto Service, Ratlam</p>
        </div>
    </div>

<script>
    // Config
    const list = ["5% OFF", "COLDRINK", "10% OFF", "ICECREAM", "20% OFF", "30% OFF"];
    const clrs = ["#ff0055", "#00fbff", "#ffcc00", "#10b981", "#8b5cf6", "#f43f5e"];
    const canv = document.getElementById("c");
    const ctx = canv.getContext("2d");

    function draw() {
        const slice = (Math.PI * 2) / 6;
        for(let i=0; i<6; i++) {
            ctx.beginPath();
            ctx.fillStyle = clrs[i];
            ctx.moveTo(150, 150);
            ctx.arc(150, 150, 145, i * slice, (i+1) * slice);
            ctx.fill();
            ctx.stroke();
            ctx.save();
            ctx.translate(150, 150);
            ctx.rotate(i * slice + slice/2);
            ctx.fillStyle = "black";
            ctx.font = "bold 14px Arial";
            ctx.fillText(list[i], 60, 5);
            ctx.restore();
        }
    }
    draw();

    function goToStep2() {
        const n = document.getElementById('uname').value;
        const m = document.getElementById('umob').value;
        if(n === "" || m === "") {
            alert("Bhai, Naam aur Number toh daalo!");
            return;
        }
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
    }
