<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivay & Bhanu Rewards - Spin to Win!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #0f172a; /* Dark Blue-Gray background */
            color: white; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { 
            padding: 30px; 
            width: 90%; 
            max-width: 480px; 
            background: #1e293b; /* Slightly lighter blue-gray */
            border-radius: 25px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.7); 
            border: 1px solid #334155;
            transition: transform 0.3s ease;
        }
        .hidden { display: none; }
        
        /* Attractive Login Styles */
        #login-screen h2 {
            color: #3b82f6; /* Blue highlight */
            font-size: 32px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #login-screen p {
            color: #94a3b8;
            margin-bottom: 30px;
        }
        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }
        input { 
            padding: 15px 15px 15px 45px; /* Space for icon */
            width: 100%; 
            border-radius: 12px; 
            border: 2px solid #334155; 
            background: #0f172a; 
            color: white; 
            font-size: 16px; 
            box-sizing: border-box; /* Crucial for full width */
            transition: border-color 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .submit-btn { 
            padding: 15px 25px; 
            background: linear-gradient(135deg, #2563eb, #7c3aed); /* Blue to Purple Gradient */
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 18px; 
            margin-top: 10px; 
            width: 100%; 
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4);
            transition: all 0.3s ease;
        }
        .submit-btn:hover { 
            opacity: 0.95; 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.6);
        }
        
        /* Poster Style */
        .poster-img { 
            width: 100%; 
            border-radius: 15px; 
            border: 3px solid #3b82f6; 
            margin-bottom: 20px; 
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.6); 
            object-fit: cover;
        }
